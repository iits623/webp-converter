<!doctype html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WebP Converter Green Flower</title>
    <link rel="stylesheet" href="./assets/css/style.css" />
    <link rel="icon" type="image/svg+xml" href="./assets/favicon.ico" />
  </head>
  <body>
    <header class="app-header">
      <h1>WebP Converter Green Flower</h1>
      <p class="subtitle">
        تصاویر خود را به فرمت WebP تبدیل کنید و حجم آنها را تا ۳۰٪ کاهش دهید
      </p>
    </header>

    <main class="app-main">
      <div class="webp-card">
        <div class="upload-zone" id="uploadZone">
          <label for="upload" class="upload-label">
            <svg
              viewBox="0 0 40 40"
              stroke="currentColor"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M28 26L20 18L12 26" stroke-width="2.2" />
              <path d="M20 18V32" stroke-width="2.2" />
              <circle cx="20" cy="16" r="2" fill="none" stroke-width="2" />
              <path d="M8 32H32" stroke-width="2.2" />
            </svg>
            <span>تصویر خود را انتخاب کنید</span>
            <small>JPG • PNG • GIF • WebP</small>
          </label>
          <input type="file" id="upload" accept="image/*" />
        </div>

        <div class="preview-wrapper" id="previewWrapper">
          <img id="preview" alt="پیش‌نمایش تصویر" />
        </div>

        <div class="action-row">
          <a id="download" class="btn-download" download="converted.webp">
            <svg viewBox="0 0 20 20" width="22" height="22">
              <path
                d="M10 1L10 13M10 13L6 9M10 13L14 9"
                stroke="white"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
              <path
                d="M2 17L18 17"
                stroke="white"
                stroke-width="2"
                stroke-linecap="round"
              />
            </svg>
            دریافت WebP
          </a>
          <button id="resetBtn" class="btn-reset">
            <svg
              viewBox="0 0 20 20"
              width="20"
              height="20"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M1 4L6 9L11 4" />
              <path d="M6 5V15" />
              <path d="M3 13L6 16L9 13" />
            </svg>
            تبدیل جدید
          </button>
        </div>
      </div>
    </main>

    <footer class="app-footer">
      <div class="footer-content">
        <p class="footer-text">
          ساخته شده با <span class="heart">💚</span> توسط
          <a href="https://pentify.ir/" target="_blank" class="footer-link"
            >آکادمی پنتیفای</a
          >
        </p>
      </div>
    </footer>

    <script src="./assets/js/script.js"></script>
  </body>
</html>
